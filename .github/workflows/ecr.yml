name: Build and push image to ECR

on:
  workflow_call:
    inputs:
      aws-region:
        type: string
        required: false
        default: us-west-2
      ecr-repository:
        type: string
        required: true
      push-image-tag:
        type: boolean
        required: false
        default: false
    outputs:
      tag:
        description: "Docker image tag"
        value: ${{ jobs.build_and_push_to_ecr.outputs.tag }}
    secrets:
      PAT_TOKEN:
        required: false
      AWS_ACCESS_KEY:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

jobs:
  check_organization:
    name: Check organization
    uses: globaluy/workflows/.github/workflows/org.yml@v2.0.0

  build_and_push_to_ecr:
    needs: check_organization
    name: Build and push image to ECR
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.image-tag.outputs.tag }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN || github.token }}
          submodules: recursive

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws-region }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker environment
        uses: docker/setup-buildx-action@v4

      - name: Set up Docker image tag
        id: image-tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build, tag and push image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: ${{ inputs.ecr-repository }}
          PUSH_IMAGE_TAG: ${{ inputs.push-image-tag }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
          LATEST_TAG: latest
        run: |
          docker buildx b --progress plain --load -f ./Dockerfile -t $REGISTRY/$REPOSITORY:$LATEST_TAG .
          docker push $REGISTRY/$REPOSITORY:$LATEST_TAG
          if [ "$PUSH_IMAGE_TAG" = "true" ]; then
            docker tag $REGISTRY/$REPOSITORY:$LATEST_TAG $REGISTRY/$REPOSITORY:$IMAGE_TAG
            docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
          fi
